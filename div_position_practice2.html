<!-- elements -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            color: antiquewhite;
            font-size: 2rem;
        }
        .fire {
            width: 50%;
            height: 50%;
            background-image: url("fire.jpg");
            background-size: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        .water {
            width: 50%;
            height: 50%;
            background-image: url("water.jpg");
            background-size: cover;
            position: absolute;
            top: 0;
            right: 0;
        }
        .earth {
            width: 50%;
            height: 50%;
            background-image: url("earth.jpg");
            background-size: cover;
            position: absolute;
            bottom: 0;
            left: 0;
        }
        .wind {
            width: 50%;
            height: 50%;
            background-image: url("wind.jpg");
            background-size: cover;
            position: absolute;
            bottom: 0;
            right: 0;
        }
    </style>
</head>
<body>
    <div class="fire">FIRE</div>
    <div class="water">WATER</div>
    <div class="earth">EARTH</div>
    <div class="wind">WIND</div>
</body>
</html>

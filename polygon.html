<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #triangle {
            width: 200px;
            height: 200px;
            background-color: lightgreen;
            clip-path: polygon(
                50% 0%,
                100% 100%,
                0% 100%
            );
        }
        #circle {
            width: 100px;
            height: 100px;
            background-color: darkmagenta;
            clip-path: circle(50% at 50% 50%);
        }
        #ellipse {
            width: 100px;
            height: 100px;
            background-color: lawngreen;
            clip-path: ellipse(10% 50% at 50% 50%);
        }
    </style>
</head>
<body>
    <div id="triangle"></div>
    <div id="circle"></div>
    <div id="ellipse"></div>
</body>
</html>
